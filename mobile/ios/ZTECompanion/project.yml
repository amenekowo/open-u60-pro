name: ZTECompanion

options:
  bundleIdPrefix: com.ztecompanion
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  ZTECompanion:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - project.yml
          - build/
          - "*.xcodeproj/"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ztecompanion.app
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  ZTECompanion:
    build:
      targets:
        ZTECompanion: all
    run:
      config: Debug
    archive:
      config: Release
